<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="肉团长">
  <defs>
    <linearGradient id="dieFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B2A9E"/>
      <stop offset="100%" stop-color="#2A1740"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D87A"/>
      <stop offset="100%" stop-color="#E5B23A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7B3FBF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2A1740" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- D20 hexagonal silhouette (pointy-top) -->
  <polygon
    points="32,4 56.25,18 56.25,46 32,60 7.75,46 7.75,18"
    fill="url(#dieFace)"
    stroke="url(#goldStroke)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Inner glow -->
  <polygon
    points="32,4 56.25,18 56.25,46 32,60 7.75,46 7.75,18"
    fill="url(#glow)"
  />

  <!-- D20 inner facets: central upward triangle + spokes to alternating vertices -->
  <g stroke="#E5B23A" stroke-opacity="0.45" stroke-width="0.9" fill="none" stroke-linejoin="round">
    <polygon points="32,16 47.5,42 16.5,42"/>
    <line x1="32" y1="16" x2="32" y2="4"/>
    <line x1="47.5" y1="42" x2="56.25" y2="46"/>
    <line x1="16.5" y1="42" x2="7.75" y2="46"/>
  </g>

  <!-- 「肉」character -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Noto Serif SC', 'Songti SC', 'STSong', 'Source Han Serif SC', 'Microsoft YaHei', serif"
    font-weight="800"
    font-size="32"
    fill="url(#goldStroke)"
    stroke="#2A1740"
    stroke-width="0.4"
    paint-order="stroke fill"
  >肉</text>

  <!-- Top accent dot (die "20" pip) -->
  <circle cx="32" cy="9" r="1.6" fill="#F5D87A"/>
</svg>
